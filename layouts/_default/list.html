{{ define "main" }}
<div class="pt-24">
  <section class="py-16 text-center">
    <div class="max-w-4xl mx-auto px-4">
      <h1 class="text-4xl sm:text-5xl font-extrabold text-text-heading mb-4">{{ .Title }}</h1>
      {{ with .Description }}
        <p class="text-text-secondary text-lg max-w-2xl mx-auto">{{ . }}</p>
      {{ end }}
    </div>
  </section>

  <div class="section-divider max-w-7xl mx-auto"></div>

  {{ if .Content }}
    <section class="py-16">
      <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="prose prose-invert max-w-none
          [&_h2]:text-text-heading [&_h2]:text-2xl [&_h2]:font-bold [&_h2]:mt-10 [&_h2]:mb-4
          [&_h3]:text-text-heading [&_h3]:text-xl [&_h3]:font-semibold [&_h3]:mt-8 [&_h3]:mb-3
          [&_p]:text-text-secondary [&_p]:leading-relaxed [&_p]:mb-4
          [&_a]:text-py-blue-light [&_a]:hover:text-py-yellow [&_a]:transition-colors
          [&_strong]:text-text-heading
          [&_ul]:text-text-secondary [&_ul]:space-y-2 [&_ul]:mb-4 [&_ul]:list-disc [&_ul]:pl-6
          [&_ol]:text-text-secondary [&_ol]:space-y-2 [&_ol]:mb-4 [&_ol]:list-decimal [&_ol]:pl-6
          [&_li]:leading-relaxed
          [&_blockquote]:border-l-4 [&_blockquote]:border-py-blue [&_blockquote]:pl-4 [&_blockquote]:italic [&_blockquote]:text-text-secondary
          [&_code]:bg-bg-card [&_code]:px-1.5 [&_code]:py-0.5 [&_code]:rounded [&_code]:text-py-yellow [&_code]:text-sm
          [&_pre]:bg-bg-card [&_pre]:rounded-xl [&_pre]:p-4 [&_pre]:overflow-x-auto
          [&_hr]:border-white/10">
          {{ .Content }}
        </div>
      </div>
    </section>
  {{ end }}

  {{ if .Pages }}
    <section class="py-8">
      <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">
        <ul class="space-y-4">
          {{ range .Pages }}
            <li>
              <a href="{{ .RelPermalink }}" class="text-py-blue-light hover:text-py-yellow transition-colors font-semibold">{{ .Title }}</a>
            </li>
          {{ end }}
        </ul>
      </div>
    </section>
  {{ end }}
</div>
{{ end }}

{{/* Event Schema - Main Conference */}}
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Event",
  "name": "{{ .Site.Title }}",
  "description": "{{ .Site.Params.description }}",
  "startDate": "2026-11-08T09:00:00+00:00",
  "endDate": "2026-11-09T18:00:00+00:00",
  "eventStatus": "https://schema.org/EventScheduled",
  "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
  "location": {
    "@type": "Place",
    "name": "{{ .Site.Params.venue }}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "University College Dublin, Belfield",
      "addressLocality": "Dublin",
      "postalCode": "Dublin 4",
      "addressRegion": "Dublin",
      "addressCountry": "IE"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": {{ .Site.Params.venueMapLat }},
      "longitude": {{ .Site.Params.venueMapLon }}
    }
  },
  "image": "{{ .Site.Params.ogImage | absURL }}",
  "organizer": {
    "@type": "Organization",
    "name": "Python Ireland",
    "url": "https://python.ie",
    "email": "{{ .Site.Params.email }}"
  },
  "offers": {
    "@type": "AggregateOffer",
    "lowPrice": "{{ (index .Site.Params.tickets 0).price }}",
    "highPrice": "{{ (index .Site.Params.tickets (sub (len .Site.Params.tickets) 1)).price }}",
    "priceCurrency": "EUR",
    "url": "{{ .Site.BaseURL }}#tickets",
    "availability": "https://schema.org/InStock"
  },
  "performer": {
    "@type": "Organization",
    "name": "Python Community Speakers"
  }
}
</script>
{{ end }}

{{/* Organization Schema - Site-wide */}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Python Ireland",
  "url": "https://python.ie",
  "logo": "{{ "/img/logo.svg" | absURL }}",
  "contactPoint": {
    "@type": "ContactPoint",
    "email": "{{ .Site.Params.email }}",
    "contactType": "Customer Service"
  },
  "sameAs": [
    "https://twitter.com/{{ strings.TrimPrefix "@" .Site.Params.twitterHandle }}"
  ]
}
</script>

{{/* WebSite Schema for Search */}}
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "publisher": {
    "@type": "Organization",
    "name": "Python Ireland"
  }
}
</script>
{{ end }}

{{/* BreadcrumbList for non-home pages */}}
{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ end }}

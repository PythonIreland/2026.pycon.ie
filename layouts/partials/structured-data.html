{{/* Event Schema - Main Conference */}}
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Event",
  "name": "{{ .Site.Title }}",
  "description": "{{ .Site.Params.description }}",
  "startDate": "{{ .Site.Params.eventStartDate }}",
  "endDate": "{{ .Site.Params.eventEndDate }}",
  "eventStatus": "https://schema.org/EventScheduled",
  "eventAttendanceMode": "https://schema.org/OfflineEventAttendanceMode",
  "location": {
    "@type": "Place",
    "name": "{{ .Site.Params.venue }}",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "{{ .Site.Params.venueStreetAddress }}",
      "addressLocality": "{{ .Site.Params.venueCity }}",
      "postalCode": "{{ .Site.Params.venuePostalCode }}",
      "addressRegion": "{{ .Site.Params.venueRegion }}",
      "addressCountry": "{{ .Site.Params.venueCountry }}"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": {{ .Site.Params.venueMapLat }},
      "longitude": {{ .Site.Params.venueMapLon }}
    }
  },
  "image": "{{ .Site.Params.ogImage | absURL }}",
  "organizer": {
    "@type": "Organization",
    "name": "{{ .Site.Params.organizerName }}",
    "url": "{{ .Site.Params.organizerUrl }}",
    "email": "{{ .Site.Params.email }}"
  },
  "offers": {
    "@type": "AggregateOffer",
    "lowPrice": "{{ (index .Site.Params.tickets 0).price }}",
    "highPrice": "{{ (index .Site.Params.tickets (sub (len .Site.Params.tickets) 1)).price }}",
    "priceCurrency": "EUR",
    "url": "{{ .Site.BaseURL }}#tickets",
    "availability": "https://schema.org/InStock"
  },
  "performer": {
    "@type": "Organization",
    "name": "Python Community Speakers"
  }
}
</script>
{{ end }}

{{/* Organization Schema - Site-wide */}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "{{ .Site.Params.organizerName }}",
  "url": "{{ .Site.Params.organizerUrl }}",
  "logo": "{{ "/img/logo.png" | absURL }}",
  "contactPoint": {
    "@type": "ContactPoint",
    "email": "{{ .Site.Params.email }}",
    "contactType": "Customer Service"
  },
  "sameAs": [
    "https://twitter.com/{{ strings.TrimPrefix "@" .Site.Params.twitterHandle }}"
  ]
}
</script>

{{/* WebSite Schema for Search */}}
{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.description }}",
  "publisher": {
    "@type": "Organization",
    "name": "{{ .Site.Params.organizerName }}"
  }
}
</script>
{{ end }}

{{/* BreadcrumbList for non-home pages */}}
{{ if not .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ .Site.BaseURL }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ .Title }}",
      "item": "{{ .Permalink }}"
    }
  ]
}
</script>
{{ end }}

<section class="py-24">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h2 class="text-3xl sm:text-4xl font-bold text-text-heading mb-4">Stay in the Loop</h2>
    <p class="text-text-secondary text-lg mb-8">
      Get the latest updates on speakers, schedule, and early bird offers.
    </p>

    <form class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto mb-8">
      <input
        type="email"
        placeholder="you@example.com"
        class="flex-1 bg-bg-card border border-white/10 rounded-xl px-4 py-3 text-text-primary placeholder-text-secondary focus:outline-none focus:ring-2 focus:ring-py-blue text-sm"
        required>
      <button type="submit" class="bg-py-yellow text-bg-primary px-6 py-3 rounded-xl font-semibold hover:bg-py-yellow-light transition-colors text-sm whitespace-nowrap">
        Subscribe
      </button>
    </form>

    <div class="flex justify-center gap-6">
      <a href="https://twitter.com/{{ strings.TrimPrefix "@" .Site.Params.twitterHandle }}" target="_blank" rel="noopener" class="text-text-secondary hover:text-py-yellow transition-colors" aria-label="Twitter">
        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>

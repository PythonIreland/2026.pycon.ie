<section class="py-24 bg-bg-secondary">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-3xl sm:text-4xl font-bold text-text-heading mb-4">Our Sponsors</h2>
      <p class="text-text-secondary max-w-2xl mx-auto text-lg">
        PyCon Ireland is made possible by the generous support of our sponsors.
      </p>
    </div>

    {{/* Show top two tiers on homepage */}}
    {{ range first 2 .Site.Data.sponsors.tiers }}
      <div class="mb-12">
        <h3 class="text-center text-sm font-semibold uppercase tracking-widest text-text-secondary mb-8">{{ .name }} Sponsors</h3>
        <div class="flex flex-wrap justify-center items-center gap-8">
          {{ range .sponsors }}
            <a href="{{ .url }}" target="_blank" rel="noopener" class="bg-bg-card rounded-xl p-6 hover:bg-bg-card-hover transition-colors">
              <img src="{{ .logo }}" alt="{{ .name }}" class="h-12 w-auto opacity-70 hover:opacity-100 transition-opacity">
            </a>
          {{ end }}
        </div>
      </div>
    {{ end }}

    <div class="text-center mt-8 flex flex-col sm:flex-row gap-4 justify-center">
      <a href="/sponsors/" class="text-py-blue-light hover:text-py-yellow font-semibold transition-colors">
        View All Sponsors &rarr;
      </a>
      <a href="mailto:{{ .Site.Params.email }}?subject=Sponsorship" class="bg-py-blue text-white px-6 py-3 rounded-xl font-semibold hover:bg-py-blue-light transition-colors">
        Become a Sponsor
      </a>
    </div>
  </div>
</section>

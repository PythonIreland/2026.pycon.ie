baseURL = "https://2026.pycon.ie/"
languageCode = "en-IE"
title = "PyCon Ireland 2026"

[taxonomies]

[build]
  [build.buildStats]
    enable = true

  [[build.cachebusters]]
    source = "assets/css/main\\.css"
    target = "css"
  [[build.cachebusters]]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"
  [[build.cachebusters]]
    source = "hugo_stats\\.json"
    target = "css"

[params]
  description = "PyCon Ireland 2026 — Ireland's premier Python conference. Join 500+ developers for talks, workshops, and networking."
  dateHuman = "17 October 2026"

  # Event dates in ISO 8601 format (for structured data)
  eventStartDate = "2026-10-17T09:00:00+01:00"
  eventEndDate = "2026-10-17T18:00:00+01:00"

  # Venue information
  venue = "Trinity College Dublin"
  venueAddress = "Trinity College Dublin, College Green, Dublin 2, Ireland"
  venueStreetAddress = "College Green"
  venueCity = "Dublin"
  venuePostalCode = "Dublin 2"
  venueRegion = "Dublin"
  venueCountry = "IE"
  venueMapLat = "53.3438"
  venueMapLon = "-6.2546"
  venuePhone = "+353 1 896 1000"
  venueWebsite = "https://www.tcd.ie/"

  # Organizer information
  organizerName = "Python Ireland"
  organizerFullName = "Python Ireland Developers CLG"
  organizerUrl = "https://python.ie"
  croNumber = "559983"

  # Contact & social
  email = "contact@python.ie"
  twitterHandle = "@pythonireland"
  mastodonHandle = "@pythonireland"
  youtubeUrl = "https://www.youtube.com/@PythonIreland"
  ogImage = "/img/og-image.png"

  [params.hero]
    title = "PyCon Ireland 2026"
    subtitle = "Ireland's Premier Python Conference"
    date = "17 October 2026"
    location = "Trinity College Dublin"

  [params.stats]
    attendees = 500
    speakers = 50
    tracks = 3
    days = 2

  [[params.tickets]]
    name = "Student"
    price = 40
    currency = "EUR"
    features = ["Full conference access", "Lunch & refreshments", "Community networking"]
    highlight = false

  [[params.tickets]]
    name = "Early Bird"
    price = 70
    currency = "EUR"
    features = ["Full conference access", "Lunch & refreshments", "Conference t-shirt", "Workshop access"]
    highlight = true

  [[params.tickets]]
    name = "General"
    price = 100
    currency = "EUR"
    features = ["Full conference access", "Lunch & refreshments", "Conference t-shirt", "Workshop access"]
    highlight = false

  [[params.tickets]]
    name = "Corporate"
    price = 300
    currency = "EUR"
    features = ["Full conference access", "Lunch & refreshments", "Conference t-shirt", "Workshop access", "Priority seating", "Networking reception"]
    highlight = false

[menus]
  [[menus.main]]
    name = "About"
    url = "/#about"
    weight = 10
  [[menus.main]]
    name = "Speakers"
    url = "/speakers/"
    weight = 20
  [[menus.main]]
    name = "Schedule"
    url = "/schedule/"
    weight = 30
  [[menus.main]]
    name = "Sponsors"
    url = "/sponsors/"
    weight = 40
  [[menus.main]]
    name = "Venue"
    url = "/venue/"
    weight = 50
  [[menus.main]]
    name = "Blog"
    url = "/blog/"
    weight = 60

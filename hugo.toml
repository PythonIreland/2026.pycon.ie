baseURL = "https://2026.pycon.ie/"
locale = "en-IE"
title = "PyCon Ireland 2026"
enableGitInfo = true

[taxonomies]

[build]
  [build.buildStats]
    enable = true

  [[build.cachebusters]]
    source = "assets/css/main\\.css"
    target = "css"
  [[build.cachebusters]]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"
  [[build.cachebusters]]
    source = "hugo_stats\\.json"
    target = "css"

[security]
  [security.funcs]
    getenv = ['^HUGO_', '^CI$', '^COMMIT_REF$', '^DEPLOY_ID$']

[params]
  description = "PyCon Ireland 2026 — Ireland's premier Python conference. Join 500+ developers for talks, workshops, and networking."
  dateHuman = "17 October 2026"

  # Event dates in ISO 8601 format (for structured data)
  eventStartDate = "2026-10-17T09:00:00+01:00"
  eventEndDate = "2026-10-17T18:00:00+01:00"

  # Venue information
  venue = "Trinity College Dublin"
  venueAddress = "Trinity College Dublin, College Green, Dublin 2, Ireland"
  venueStreetAddress = "College Green"
  venueCity = "Dublin"
  venuePostalCode = "Dublin 2"
  venueRegion = "Dublin"
  venueCountry = "IE"
  venueMapLat = 53.3438
  venueMapLon = -6.2546
  venuePhone = "+353 1 896 1000"
  venueWebsite = "https://www.tcd.ie/"

  # Organizer information
  organizerName = "Python Ireland"
  organizerFullName = "Python Ireland Developers CLG"
  organizerUrl = "https://python.ie"
  croNumber = "559983"

  # CFP status: "soon" or "open"
  cfpStatus = "open"
  cfpUrl = "https://sessionize.com/pycon-ireland-2026/"
  cfpOpens = "2026-05-25"
  cfpCloses = "2026-08-30"

  # Contact & social
  email = "contact@python.ie"
  twitterHandle = "@pythonireland"
  mastodonHandle = "@Python_Ireland"
  mastodonUrl = "https://mastodon.ie/@Python_Ireland"
  youtubeUrl = "https://www.youtube.com/@PythonIreland"
  linkedinUrl = "https://www.linkedin.com/company/python-ireland"
  ogImage = "/img/og-image.png"

  [params.hero]
    title = "PyCon Ireland 2026"
    subtitle = "Ireland's Premier Python Conference"
    date = "17 October 2026"
    location = "Trinity College Dublin"

  [params.stats]
    attendees = 500
    speakers = 50
    tracks = 3
    days = 1

  [[params.tickets]]
    name = "Student"
    price = 40
    currency = "EUR"
    features = ["Full conference access", "Lunch & refreshments", "Community networking"]
    highlight = false

  [[params.tickets]]
    name = "Early Bird"
    price = 70
    currency = "EUR"
    features = ["Full conference access", "Lunch & refreshments", "Conference t-shirt", "Workshop access"]
    highlight = true

  [[params.tickets]]
    name = "General"
    price = 100
    currency = "EUR"
    features = ["Full conference access", "Lunch & refreshments", "Conference t-shirt", "Workshop access"]
    highlight = false

  [[params.tickets]]
    name = "Corporate"
    price = 300
    currency = "EUR"
    features = ["Full conference access", "Lunch & refreshments", "Conference t-shirt", "Workshop access", "Priority seating", "Networking reception"]
    highlight = false

[menus]
  [[menus.main]]
    name = "Call for Proposals"
    url = "/cfp/"
    weight = 20
  # [[menus.main]]
  #   name = "Sponsors"
  #   url = "/sponsors/"
  #   weight = 40
  [[menus.main]]
    identifier = "venue"
    name = "Venue"
    weight = 50

  [[menus.main]]
    name = "Venue"
    url = "/venue/"
    parent = "venue"
    weight = 1

  [[menus.main]]
    name = "Dublin"
    url = "/dublin/"
    parent = "venue"
    weight = 2
  [[menus.main]]
    identifier = "community"
    name = "Community"
    weight = 60

  [[menus.main]]
    name = "About Us"
    url = "/about/"
    parent = "community"
    weight = 1

  [[menus.main]]
    name = "Python Ireland"
    url = "https://python.ie"
    parent = "community"
    weight = 2

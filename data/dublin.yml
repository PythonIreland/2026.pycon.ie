highlights:
  - title: "Trinity College & Book of Kells"
    description: "Our conference venue is itself one of Dublin's top attractions. The Old Library and the illuminated Book of Kells are unmissable."
    link: "https://www.tcd.ie/visitors/"
    photo: "https://images.unsplash.com/photo-1529106480931-45a586ae6857?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Unsplash"

  - title: "National Gallery of Ireland"
    description: "Free entry to world-class art collections, just a short walk from TCD. From Caravaggio to Jack B. Yeats."
    link: "https://www.nationalgallery.ie/"
    photo: "https://images.unsplash.com/photo-1603750003385-3342231a1ff1?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Unsplash"

  - title: "Phoenix Park"
    description: "One of the largest walled city parks in Europe — home to a herd of wild fallow deer and the official residence of the Irish President."
    link: "https://www.phoenixpark.ie/"
    photo: "https://images.unsplash.com/photo-1608682153599-0438133c23f8?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Fabrício Severo on Unsplash"

  - title: "The Liberties & Guinness Storehouse"
    description: "Explore the historic Liberties neighbourhood and learn the story of Ireland's most famous stout at the Guinness Storehouse."
    link: "https://www.guinness-storehouse.com/"
    photo: "https://images.unsplash.com/photo-1694523799034-277a071fc671?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Jean Vella on Unsplash"

  - title: "Food & Markets"
    description: "Dublin's food scene has exploded. Visit Eatyard, the Covered Market, or simply grab a coffee on Drury Street."
    photo: "https://images.unsplash.com/photo-1540139577579-461a5616da6b?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Nicolas Comte on Unsplash"

  - title: "Howth & Malahide"
    description: "Just 30 minutes by DART train — dramatic coastal cliffs, fresh seafood, and a medieval castle. Perfect for a half-day trip."
    photo: "https://images.unsplash.com/photo-1545131134-6d30117d7014?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Alejandro Luengo on Unsplash"

transport:
  - mode: "DART"
    description: "Coastal rail service connecting Dublin city centre to Howth, Malahide, Bray and Greystones. Runs every 10–15 min."
    photo: "https://images.unsplash.com/photo-1590913755053-a3543fac9de5?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Duy Thanh Nguyen on Unsplash"
  - mode: "Luas"
    description: "Two tram lines (Red & Green). The Green Line serves the conference area — stops at St. Stephen's Green and Dawson Street."
    photo: "https://images.unsplash.com/photo-1766593896586-9c597d86faf2?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "lesha tuman on Unsplash"
  - mode: "Dublin Bus"
    description: "Extensive network across the city and suburbs. The Real-Time app shows live departure times."
    photo: "https://images.unsplash.com/photo-1660548545727-c8f1a96cb63b?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "NIR HIMI on Unsplash"
  - mode: "Leap Card"
    description: "Reloadable travel card for all public transport — buses, DART, Luas and commuter rail. Available at the airport and convenience stores."
    photo: "https://images.unsplash.com/photo-1742836531239-1fe146bf7e3f?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Unsplash"
  - mode: "Dublin Bikes"
    description: "110+ self-service stations across the city centre. First 30 minutes free with a day pass — perfect for short hops between venues."
    photo: "https://images.unsplash.com/photo-1584278140365-2ab8bff2be82?w=600&h=300&q=80&auto=format&fit=crop"
    photo_credit: "Unsplash"

[build]
  command = "npm install && hugo --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.161.1"
  NODE_VERSION = "22"
  TZ = "Europe/Dublin"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview.environment]
  HUGO_ENV = "development"

# Fingerprinted CSS assets — cache immutably for 1 year
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static images (not fingerprinted) — cache for 1 week
[[headers]]
  for = "/img/**"
  [headers.values]
    Cache-Control = "public, max-age=604800, must-revalidate"

# Root HTML — always revalidate
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
